services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
            memory: 24g
            cpus: '8'
        reservations:
          memory: 256m
          cpus: '1'
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: openwebui
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: '2'
        reservations:
          memory: 512m
          cpus: '0.25'
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    volumes:
      - ./crawl4ai_data:/root/.crawl4ai
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2'
        reservations:
          memory: 256m
          cpus: '0.5'

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1'
        reservations:
          memory: 128m
          cpus: '0.25'

volumes:
  open-webui:
  ollama_data:
  crawl4ai_data:
