services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: openwebui
    ports:
      - "4591:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
  
  opencode:
    image: ghcr.io/anomalyco/opencode
    container_name: opencode
    stdin_open: true
    tty: true
    volumes:
      - ${PWD}:/project/${DIR}
      - ./.config/opencode:/root/.config/opencode
    working_dir: /project/${DIR}
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    profiles:
      - opencode

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    ports:
      - "11235:11235"
    volumes:
      - ./crawl4ai_data:/root/.crawl4ai
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped

volumes:
  open-webui:
  ollama_data:
  crawl4ai_data:
