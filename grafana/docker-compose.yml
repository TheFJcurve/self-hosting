services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./grafana_data:/var/lib/grafana
    env_file:
      - .env
    depends_on:
      - prometheus
    networks:
      - grafana_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'
        reservations:
          memory: 256m
          cpus: '0.1'

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./uptime_kuma_token:/run/secrets/uptime_kuma_token:ro 
    depends_on:
      - cadvisor
    networks:
      - grafana_network
      - immich_network
      - vaultwarden_network
      - kuma_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1500m
          cpus: '1'
        reservations:
          memory: 256m
          cpus: '0.1'

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki_data:/loki
    networks:
      - grafana_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1'
        reservations:
          memory: 128m
          cpus: '0.1'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - grafana_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1'
        reservations:
          memory: 128m
          cpus: '0.25'

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - grafana_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 16m
          cpus: '0.05'

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    networks:
      - grafana_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.1'

  dcgm_exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:latest
    container_name: dcgm_exporter
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.1'
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    networks:
      - grafana_network

networks:
  grafana_network:
    name: grafana_default
    driver: bridge
  immich_network:
    external: true
    name: immich_default
  vaultwarden_network:
    external: true
    name: vaultwarden_default
  kuma_network:
    external: true
    name: kuma_default