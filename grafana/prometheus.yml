global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: dcgm_exporter
    static_configs:
      - targets:
          - dcgm_exporter:9400

  - job_name: immich_api
    static_configs:
      - targets:
          - immich_server:8081

  - job_name: immich_microservices
    static_configs:
      - targets:
          - immich_server:8082

  - job_name: vaultwarden
    metrics_path: /metrics
    static_configs:
      - targets:
          - vaultwarden:80
  
  - job_name: uptime_kuma
    metrics_path: /metrics
    static_configs:
      - targets:
          - uptime-kuma:3001
    basic_auth:
      password_file: /run/secrets/uptime_kuma_token