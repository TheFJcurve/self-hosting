services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: ./music
        target: /data/music
      - type: bind
        source: ./anime
        target: /data/anime
      - type: bind
        source: ./shows
        target: /data/shows
      - type: bind
        source: ./movies
        target: /data/movies
    restart: unless-stopped
    environment:
      - JELLYFIN_PublishedServerUrl=http://jellyfin.tail.sargun.ca
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '3'
        reservations:
          memory: 1g
          cpus: '0.5'
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  jellyfin_network:
    name: jellyfin_default
    driver: bridge
