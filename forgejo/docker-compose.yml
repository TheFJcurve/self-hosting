services:
  server:
    image: codeberg.org/forgejo/forgejo:15.0.1
    container_name: forgejo
    restart: unless-stopped
    networks:
      - forgejo_network
    volumes:
      - /mnt/passport/forgejo/library:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - 222:22
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '4'
        reservations:
          memory: 512m
          cpus: '0.5'

  db:
    image: postgres:14
    container_name: forgejo_postgres
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - forgejo_network
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    deploy:
        resources:
          limits:
            memory: 512m
            cpus: '1'
          reservations:
            memory: 128m
            cpus: '0.1'

  docker-in-docker:
    image: docker:dind
    container_name: docker_dind
    privileged: 'true'
    command: ['dockerd', '-H', 'tcp://0.0.0.0:2375', '--tls=false']
    restart: 'unless-stopped'
    networks:
      - forgejo_network
    deploy:
        resources:
          limits:
            memory: 2g
            cpus: '2'

  runner:
    image: 'data.forgejo.org/forgejo/runner:12'
    links:
      - docker-in-docker
    depends_on:
      docker-in-docker:
        condition: service_started
    container_name: forgejo_runner
    environment:
      DOCKER_HOST: http://docker_dind:2375
    networks:
      - forgejo_network
    user: 1001:1001
    volumes:
      - ./forgejo_runner_data:/data
    restart: 'unless-stopped'
    command: 'forgejo-runner daemon --config runner-config.yml'
    deploy:
        resources:
          limits:
            memory: 4g
            cpus: '4'

networks:
  forgejo_network:
    name: forgejo_default
    driver: bridge
