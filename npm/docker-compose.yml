services:
  nginx_proxy_manager:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx_proxy_manager
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 81:81
    volumes:
      - ./data/npm_data:/data
      - ./data/npm_letsencrypt:/etc/letsencrypt
      - ./data/npm_logs:/var/log/nginx
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite"
      INITIAL_ADMIN_EMAIL: admin@example.com
      INITIAL_ADMIN_PASSWORD: changeme
    networks:
      - npm_proxy
      - nextcloud_network
      - immich_network
      - openwebui_network
      - vaultwarden_default
      - jellyfin_default
      - forgejo_default
      - clipcascade_default
      - grafana_network
      - kopia_network
      - kuma_network
      - authentik_network
      - pihole_network
    deploy:
      resources:
        limits:
          memory: 900m
          cpus: '1'
        reservations:
          memory: 128m
          cpus: '0.1'

networks:
  npm_proxy:
    name: npm_proxy
    driver: bridge
  nextcloud_network:
    external: true
    name: nextcloud_default
  immich_network:
    external: true
    name: immich_default
  openwebui_network:
    external: true
    name: open-webui_default
  vaultwarden_default:
    external: true
    name: vaultwarden_default
  jellyfin_default:
    external: true
    name: jellyfin_default
  forgejo_default:
    external: true
    name: forgejo_default
  clipcascade_default:
    external: true
    name: clipcascade_default
  grafana_network:
    external: true
    name: grafana_default
  kopia_network:
    external: true
    name: kopia_default
  kuma_network:
    external: true
    name: kuma_default
  authentik_network:
    external: true
    name: authentik_default
  pihole_network:
    external: true
    name: pihole_default