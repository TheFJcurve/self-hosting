name: Generate Architecture Diagram

on:
  push:
    branches: [main]
    paths:
      - '**/docker-compose.yml'
      - '**/compose.yml'
  pull_request:
    paths:
      - '**/docker-compose.yml'

jobs:
  diagram:
    runs-on: docker
    container:
      image: python:3.12-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y graphviz git
          pip install diagrams pyyaml

      - name: Generate diagram
        run: python .forgejo/scripts/generate_diagram.py

      - name: Commit diagram
        if: github.event_name == 'push'
        run: |
          git config user.name "forgejo-actions"
          git config user.email "actions@local"
          git add docs/architecture.png
          git diff --staged --quiet || git commit -m "chore: update architecture diagram [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload diagram artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture-diagram
          path: docs/architecture.png

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Architecture Diagram\n\nDiagram generated from this PR's compose files.\n[Download diagram](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n> Networks are color-coded · Orange = exposed host ports · Red dashed = isolated stacks`
            })